<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 — signal not found · Organic Computer</title>
<style>
  :root{--bg:#0d1117;--text:rgba(230,237,243,.92);--muted:#8b949e;--gold:#d4a853;--copper:#c8956a;
    --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,"Segoe UI",Roboto,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(80% 120% at 50% 0%,#10151f,#0d1117 70%);color:var(--text);
    font-family:var(--sans);display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;line-height:1.6}
  .wrap{max-width:34rem}
  .code{font-family:var(--mono);font-size:clamp(3rem,12vw,6rem);font-weight:700;color:var(--gold);letter-spacing:-.03em;line-height:1}
  .eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--copper);margin-bottom:1.25rem}
  h1{font-family:var(--sans);font-size:1.4rem;font-weight:600;margin:1rem 0 .5rem}
  p{color:var(--muted);margin-bottom:1.5rem}
  a{display:inline-block;font-weight:600;color:#1a1206;background:linear-gradient(180deg,#e0b667,#c8956a);
    padding:.7rem 1.5rem;border-radius:10px;text-decoration:none}
  a:hover{filter:brightness(1.06)}
  .ohm{font-family:var(--mono);color:var(--muted);font-size:.85rem;margin-top:2rem}
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Error · no route to resource</div>
    <div class="code">404</div>
    <h1>Signal not found.</h1>
    <p>This address doesn't resolve to anything. Push raw input through with zero resistance and you get noise — let's get you back to signal.</p>
    <a href="/">Return to the datasheet</a>
    <p class="ohm">// organiccomputer.me</p>
  </div>
</body>
</html>
