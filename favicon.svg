<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Organic Computer">
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <!-- circuit traces -->
  <g stroke="#c8956a" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M5 16 H10"/>
    <path d="M22 16 H27"/>
    <path d="M16 5 V9"/>
    <path d="M16 23 V27"/>
  </g>
  <!-- nodes -->
  <g fill="#3fb950">
    <circle cx="5" cy="16" r="1.6"/>
    <circle cx="27" cy="16" r="1.6"/>
  </g>
  <g fill="#d4a853">
    <circle cx="16" cy="5" r="1.6"/>
    <circle cx="16" cy="27" r="1.6"/>
  </g>
  <!-- central organic/compute core: a rounded square (chip) holding a spark of life -->
  <rect x="10" y="10" width="12" height="12" rx="3.5" fill="none" stroke="#d4a853" stroke-width="1.6"/>
  <path d="M16 11.5 a4.5 4.5 0 1 0 0.01 0 Z" fill="none" stroke="#56d364" stroke-width="1.3" opacity=".9"/>
  <circle cx="16" cy="16" r="1.8" fill="#56d364"/>
</svg>
